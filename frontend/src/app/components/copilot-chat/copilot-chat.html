<div class="chat-container">
  <div class="chat-header">
    <div class="header-titles">
      <h3 style="margin: 0;">Omni-Civic Copilot</h3>
      <span class="badge audio-badge">🎙️ Hyper-Local Audio</span>
    </div>
    <div class="header-controls">
      <button class="settings-btn" (click)="showSettingsSheet.set(true)" aria-label="Open Settings">⚙️ Settings</button>
    </div>
  </div>
  
  <div class="bottom-sheet-overlay" [class.active]="showSettingsSheet()" (click)="showSettingsSheet.set(false)">
    <div class="bottom-sheet" (click)="$event.stopPropagation()">
      <div class="sheet-header">
        <h3>Copilot Settings</h3>
        <button class="close-btn" (click)="showSettingsSheet.set(false)" aria-label="Close Settings">✖</button>
      </div>
      <div class="sheet-content">
        <div class="setting-item">
          <label>Language</label>
          <select class="lang-select" [ngModel]="selectedLang()" (ngModelChange)="onLanguageChange($event)" title="Select Language">
            <option *ngFor="let lang of languages" [value]="lang.code">{{ lang.name }}</option>
          </select>
        </div>
        <div class="setting-item">
          <label>AI Voice Reading</label>
          <button class="audio-toggle" (click)="toggleAudio()" [title]="isAudioEnabled() ? 'Mute AI Voice' : 'Unmute AI Voice'" aria-label="Toggle AI Voice">
            {{ isAudioEnabled() ? '🔊 Enabled' : '🔇 Muted' }}
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="chat-history" [class.has-messages]="messages().length > 0" (scroll)="checkScroll()" aria-live="polite">
    <div *ngIf="messages().length === 0" class="empty-state">
      Ask the Omni-Civic Copilot about election procedures via Text or Voice!
    </div>
    <div *ngFor="let msg of messages()" [ngClass]="msg.role === 'user' ? 'user-msg' : 'ai-msg'">
      <div class="msg-header">
        <strong>{{ msg.role === 'user' ? 'You' : 'Copilot' }}:</strong>
        <button *ngIf="msg.role === 'ai'" class="copy-btn" (click)="copyToClipboard(msg.text)" aria-label="Copy to Clipboard">📋 Copy</button>
      </div>
      <markdown [data]="msg.text"></markdown>
    </div>
    <div *ngIf="loading()" class="loading">Copilot is generating response...</div>
  </div>
  
  <div class="chat-input-wrapper">
    <button class="scroll-bottom-btn" [class.show]="showScrollButton()" (click)="scrollToBottom()" aria-label="Scroll to Bottom">⬇️ Scroll to Bottom</button>
    <div class="chat-input">
      <input type="text" [(ngModel)]="query" placeholder="Ask a civic question (e.g. Can I vote without an Epic card?)" (keyup.enter)="sendMessage()" aria-label="Chat input" />
      <button class="mic-btn" (click)="toggleListening()" [class.listening]="isListening()" title="Tap to Speak" aria-label="Microphone">
        <span class="icon">🎤</span>
      </button>
      <button class="send-btn" (click)="sendMessage()" [disabled]="loading() || !query()" aria-label="Send message">Send</button>
    </div>
    <div *ngIf="isListening()" class="listening-indicator">Listening... Speak now.</div>
  </div>
</div>
