<div class="kyc-container">
  <div class="header">
    <h2>KYC Radar</h2>
    <p>Real-time background scanning for political candidates.</p>
  </div>
  
  <div class="search-bar">
    <div class="input-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" [(ngModel)]="candidateId" placeholder="Enter Candidate Name or ID..." (keyup.enter)="searchCandidate()" />
    </div>
    <button (click)="searchCandidate()" [disabled]="loading() || !candidateId()">Scan Profile</button>
  </div>
  
  <div *ngIf="loading()" class="skeleton-wrapper">
    <div class="skeleton-header"></div>
    <div class="skeleton-text"></div>
    <div class="skeleton-text"></div>
    <div class="skeleton-text short"></div>
  </div>
  
  <p *ngIf="error()" class="error">⚠️ {{ error() }}</p>

  <div *ngIf="profile()" class="profile-card fade-in result-print-area">
    <div class="card-header">
      <h3>Candidate Background Summary</h3>
      <div style="display: flex; gap: 10px; align-items: center;">
        <span class="badge verified">Verified by AI</span>
        <button class="export-btn" (click)="printReport()">📄 Export PDF</button>
      </div>
    </div>
    <div class="profile-content">
      <markdown [data]="profile()"></markdown>
    </div>
  </div>
</div>
